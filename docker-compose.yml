services:
  postgres:
    image: postgres:14
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-yape_db}
      - POSTGRES_USER=${POSTGRES_USER:-yape_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yape_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yape_user} -d ${POSTGRES_DB:-yape_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - yape-network
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_USERNAME: ${KAFKA_USERNAME:-kafka_user}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-kafka_pass}
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9093}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9991
    ports:
      - "${KAFKA_HOST_PORT:-9093}:9092"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - yape-network

  api-transaction:
    build:
      context: ./src/TransactionService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-transactions.created}"
      KAFKA_TOPIC_STATUS: "${KAFKA_TOPIC_STATUS:-transactions.status}"
      DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-yape_db};Username=${POSTGRES_USER:-yape_user};Password=${POSTGRES_PASSWORD:-yape_pass}"
    ports:
      - "${API_TRANSACTION_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - yape-network

  listenet-antifraud:
    build:
      context: ./src/AntiFraudService
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-transactions.created}"
      KAFKA_TOPIC_STATUS: "${KAFKA_TOPIC_STATUS:-transactions.status}"
      KAFKA_CONSUMER_GROUP: "${KAFKA_CONSUMER_GROUP:-antifraud-group}"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yape-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - yape-network
      
# devcontainer
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:8.0
    volumes:
      - .:/workspace:cached
    command: sleep infinity 
    networks:
      - yape-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

networks:
  yape-network:
    driver: bridge
